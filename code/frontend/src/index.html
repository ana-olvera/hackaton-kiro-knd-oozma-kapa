<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Ayuda a Michi Godín - Sobrevive al Sprint</title>
  <base href="/">
  
  <!-- Viewport optimizado para móviles y PWA -->
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  
  <!-- Descripción y SEO -->
  <meta name="description" content="Un videojuego PWA donde aprendes Git mientras sobrevives la oficina">
  <meta name="keywords" content="git, juego, pwa, programación, godín, educación">
  <meta name="author" content="Oozma Kapa">
  
  <!-- PWA y Tema -->
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Michi Godín">
  
  <!-- Prevenir zoom y gestos no deseados en móviles -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="format-detection" content="telephone=no">
  
  <!-- Open Graph para compartir en redes sociales -->
  <meta property="og:title" content="Ayuda a Michi Godín - Sobrevive al Sprint">
  <meta property="og:description" content="Aprende Git mientras sobrevives a la oficina 🐱💻">
  <meta property="og:type" content="website">
  <meta property="og:image" content="assets/og-image.png">
  
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Ayuda a Michi Godín">
  <meta name="twitter:description" content="Aprende Git mientras sobrevives a la oficina">
  
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="manifest" href="manifest.webmanifest">
  
  <style>
    /* Prevenir comportamientos no deseados en móviles */
    * {
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
    }
    
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      position: fixed;
      width: 100%;
      height: 100%;
      height: 100dvh;
      overscroll-behavior: none;
      touch-action: none;
    }
    
    body {
      /* Para iOS Safari - evita que la barra de direcciones cree espacio */
      min-height: -webkit-fill-available;
    }
    
    /* Loading screen */
    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      height: 100dvh;
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      color: white;
      font-family: sans-serif;
    }
    
    #loading .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-top-color: #00ff88;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    #loading p {
      margin-top: 20px;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <p>Cargando Michi Godín...</p>
  </div>
  <app-root></app-root>
  <noscript>Por favor activa JavaScript para jugar Ayuda a Michi Godín.</noscript>
  
  <script>
    // Ocultar loading screen cuando la app carga
    window.addEventListener('load', function() {
      setTimeout(function() {
        var loading = document.getElementById('loading');
        if (loading) {
          loading.style.opacity = '0';
          loading.style.transition = 'opacity 0.5s';
          setTimeout(function() {
            loading.style.display = 'none';
          }, 500);
        }
      }, 1000);
    });
    
    // Prevenir zoom con gestos en iOS
    document.addEventListener('gesturestart', function(e) {
      e.preventDefault();
    });
    
    // Prevenir comportamiento de doble tap en móviles
    var lastTouchEnd = 0;
    document.addEventListener('touchend', function(event) {
      var now = (new Date()).getTime();
      if (now - lastTouchEnd <= 300) {
        event.preventDefault();
      }
      lastTouchEnd = now;
    }, false);
  </script>
</body>
</html>
